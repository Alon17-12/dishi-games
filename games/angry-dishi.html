<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Angry Dishi 💥</title>
  <link rel="icon" type="image/png" href="../assets/dishi.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #87CEEB;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 16px;
      background: rgba(0,0,0,0.5);
      color: #fff; font-weight: bold; font-size: 14px;
      z-index: 10;
      direction: rtl;
    }
    .hud-item { display: flex; align-items: center; gap: 6px; }
    .hud-val { color: #ffd700; font-size: 18px; }
    canvas {
      display: block;
      cursor: crosshair;
    }
    /* Level complete overlay */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 20; padding: 24px;
    }
    #overlay.show { display: flex; }
    #ov-title {
      font-size: 2.4rem; font-weight: 900;
      text-align: center; color: #ffd700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    #ov-score { font-size: 1.6rem; color: #fff; text-align: center; }
    #ov-stars { font-size: 3rem; text-align: center; letter-spacing: 8px; }
    .btn {
      background: linear-gradient(135deg, #ff6b35, #ff9a5c);
      color: white; border: none; padding: 14px 36px;
      border-radius: 50px; cursor: pointer;
      font-size: 1.1rem; font-weight: 700;
      box-shadow: 0 4px 20px rgba(255,107,53,0.45);
      transition: transform 0.18s;
    }
    .btn:hover { transform: scale(1.06); }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      padding: 10px 24px; font-size: 0.9rem;
    }
    #save-status {
      font-size: 0.78rem; color: rgba(255,255,255,0.5); min-height: 24px;
    }
    #save-status.saved { color: rgba(100,255,160,0.9); }
    /* Space-to-start */
    #space-overlay {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(0,0,0,0.82);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; pointer-events: all; cursor: pointer;
    }
    #space-overlay.hidden { display: none; }
    .spc-title { font-size: 2.2rem; font-weight: 900; color: #ffd700; text-shadow: 0 0 24px rgba(255,200,0,0.6); }
    .spc-hint { font-size: 1.1rem; color: #fff; animation: blink 1.1s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    /* Mobile */
    @media (max-width: 480px) {
      #hud { font-size: 12px; padding: 6px 10px; }
      .hud-val { font-size: 15px; }
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-item">💥 ניקוד: <span class="hud-val" id="hud-score">0</span></div>
  <div class="hud-item">🎯 שלב: <span class="hud-val" id="hud-level">1</span>/10</div>
  <div class="hud-item">🐦 דישים: <span class="hud-val" id="hud-birds">5</span></div>
  <div class="hud-item">⏱ <span class="hud-val" id="hud-timer">60</span></div>
</div>

<div id="space-overlay">
  <div class="spc-title">💥 Angry Dishi</div>
  <div class="spc-hint">לחץ SPACE או הקש כאן להתחלה</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="overlay">
  <div id="ov-title"></div>
  <div id="ov-stars"></div>
  <div id="ov-score"></div>
  <div id="save-status"></div>
  <button class="btn" id="btn-next">▶ שלב הבא</button>
  <button class="btn btn-secondary" id="btn-retry">🔄 שחק שוב</button>
</div>

<audio id="launchSound" preload="auto">
  <source src="../assets/אפשר לקבל סודה.MP3" type="audio/mpeg">
</audio>

<script type="module">
// ═══════════════════════════════════════════
//  ANGRY DISHI — Canvas Physics Game
// ═══════════════════════════════════════════

// ─── Firebase (lazy) ─────────────────────
async function trySaveScore(score) {
  try {
    const [{ saveScore }, { auth }] = await Promise.all([
      import('../leaderboard.js'),
      import('../firebase-config.js'),
    ]);
    const el = document.getElementById('save-status');
    if (!auth.currentUser) {
      el.className = ''; el.textContent = '🔒 התחבר בלובי כדי לשמור';
      return;
    }
    await saveScore('angry-dishi', auth.currentUser, score);
    el.className = 'saved';
    const _e = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
    el.innerHTML = `✅ ${_e(auth.currentUser.displayName)} — ניקוד נשמר`;
  } catch(e) { console.warn('Score not saved:', e); }
}

// ─── Olympic mode ────────────────────────
const _params = new URLSearchParams(location.search);
const _olympicMode = _params.get('olympic') === '1';

// ─── Canvas setup ────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = Math.min(window.innerWidth, 900);
  canvas.height = Math.min(window.innerHeight - 40, 560);
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

const W = () => canvas.width;
const H = () => canvas.height;

// ─── Dishi image ─────────────────────────
const dishiImg = new Image();
let dishiLoaded = false;
dishiImg.onload = () => { dishiLoaded = true; };
dishiImg.src = '../assets/dishi.png';

// ─── Launch sound ────────────────────────
const launchSound = document.getElementById('launchSound');
launchSound.volume = 0.8;

// ─── Physics constants ───────────────────
const GRAVITY = 0.32;
const AIR_DRAG = 0.997;       // velocity multiplier per frame — slows bird over distance
const WIND_DRIFT = -0.012;    // slight leftward wind for realism
const GROUND_FRICTION = 0.6;
const BOUNCE_DAMPING = 0.3;
const BLOCK_FRICTION = 0.85;
const SPIN_DRAG = 0.98;       // rotation slows down

// ─── Game state ──────────────────────────
let currentLevel = 0;
let totalScore = 0;
let levelScore = 0;
let birdsLeft = 5;
let timeLeft = 60;
let timerInterval = null;
let gamePhase = 'AIM'; // AIM, FLYING, SETTLING, LEVEL_DONE, GAME_OVER
let settleTimer = 0;

// ─── Slingshot ───────────────────────────
const SLING_X = () => Math.round(W() * 0.15);
const SLING_Y = () => H() - 100;
const SLING_RADIUS = 55;
let isDragging = false;
let dragX = 0, dragY = 0;
let aimX = 0, aimY = 0;

// ─── Bird (projectile) ──────────────────
let bird = null;
const BIRD_R = 18;

// ─── Blocks & Enemies ───────────────────
let blocks = [];
let enemies = [];
let particles = [];
let debris = [];

// ─── Block types ─────────────────────────
const BLOCK_TYPES = {
  wood:  { color: '#8B6914', dark: '#6B4F10', hp: 3, density: 1 },
  stone: { color: '#888', dark: '#666', hp: 6, density: 2 },
  glass: { color: '#88CCEE', dark: '#66AACC', hp: 1, density: 0.5 },
};

// ─── Enemy types (dirty things) ──────────
const ENEMY_TYPES = [
  { emoji: '🍽️', name: 'צלחת מלוכלכת', points: 100, hp: 2 },
  { emoji: '🥤', name: 'כוס מלוכלכת', points: 120, hp: 2 },
  { emoji: '🧻', name: 'גליל נייר', points: 80, hp: 1 },
  { emoji: '💩', name: 'קקי סטיק', points: 150, hp: 3 },
  { emoji: '🪣', name: 'דלי מלוכלך', points: 130, hp: 2 },
];
const ENEMY_R = 12;

// ═══════════════════════════════════════════
//  LEVELS (10 total)
// ═══════════════════════════════════════════
function generateLevels() {
  const levels = [];

  // Helper: create block
  function B(x, y, w, h, type = 'wood') {
    return { x, y, w, h, type, hp: BLOCK_TYPES[type].hp, vx: 0, vy: 0, angle: 0, va: 0 };
  }
  // Helper: create enemy
  function E(x, y, typeIdx = 0) {
    const t = ENEMY_TYPES[typeIdx % ENEMY_TYPES.length];
    return { x, y, r: ENEMY_R, emoji: t.emoji, name: t.name, points: t.points, hp: t.hp, alive: true, vx: 0, vy: 0 };
  }

  // Scale positions relative to canvas
  const rX = (frac) => Math.round(W() * frac);
  const bY = (up) => H() - 60 - up;

  // ── Level 1: Simple shelter — enemy INSIDE a wooden box ──
  levels.push(() => ({
    blocks: [
      B(rX(0.62), bY(0), 15, 50, 'wood'),  // left wall
      B(rX(0.73), bY(0), 15, 50, 'wood'),  // right wall
      B(rX(0.62), bY(50), 130, 15, 'wood'), // roof
    ],
    enemies: [E(rX(0.68), bY(12), 0)], // sheltered inside
  }));

  // ── Level 2: Two shelters side by side ──
  levels.push(() => ({
    blocks: [
      // Shelter A
      B(rX(0.5), bY(0), 12, 45, 'wood'), B(rX(0.6), bY(0), 12, 45, 'wood'),
      B(rX(0.5), bY(45), 80, 12, 'wood'),
      // Shelter B
      B(rX(0.7), bY(0), 12, 45, 'wood'), B(rX(0.8), bY(0), 12, 45, 'wood'),
      B(rX(0.7), bY(45), 80, 12, 'wood'),
    ],
    enemies: [E(rX(0.56), bY(12), 1), E(rX(0.76), bY(12), 2)],
  }));

  // ── Level 3: Glass bunker — fragile but enclosed ──
  levels.push(() => ({
    blocks: [
      B(rX(0.58), bY(0), 15, 60, 'glass'),  // left wall
      B(rX(0.75), bY(0), 15, 60, 'glass'),  // right wall
      B(rX(0.58), bY(60), 175, 12, 'glass'), // roof
      B(rX(0.58), bY(30), 175, 10, 'glass'), // inner shelf
    ],
    enemies: [E(rX(0.67), bY(12), 0), E(rX(0.67), bY(42), 3)],
  }));

  // ── Level 4: Stone walls, wood roof — need to break the roof ──
  levels.push(() => ({
    blocks: [
      B(rX(0.55), bY(0), 20, 80, 'stone'),  // left wall (strong!)
      B(rX(0.75), bY(0), 20, 80, 'stone'),  // right wall (strong!)
      B(rX(0.55), bY(80), 200, 15, 'wood'),  // breakable roof
      B(rX(0.62), bY(40), 100, 10, 'wood'),  // inner platform
    ],
    enemies: [E(rX(0.66), bY(12), 4), E(rX(0.66), bY(52), 1)],
  }));

  // ── Level 5: Pyramid bunker — layered defense ──
  levels.push(() => ({
    blocks: [
      B(rX(0.5), bY(0), 20, 100, 'wood'),   // outer left
      B(rX(0.78), bY(0), 20, 100, 'wood'),  // outer right
      B(rX(0.5), bY(100), 280, 15, 'wood'),  // outer roof
      B(rX(0.58), bY(0), 15, 55, 'wood'),   // inner left
      B(rX(0.7), bY(0), 15, 55, 'wood'),    // inner right
      B(rX(0.58), bY(55), 120, 12, 'wood'),  // inner roof
    ],
    enemies: [E(rX(0.64), bY(12), 0), E(rX(0.64), bY(70), 2), E(rX(0.72), bY(12), 3)],
  }));

  // ── Level 6: Elevated fortress — enemies on platform ──
  levels.push(() => ({
    blocks: [
      // Base pillars
      B(rX(0.5), bY(0), 20, 70, 'stone'), B(rX(0.75), bY(0), 20, 70, 'stone'),
      B(rX(0.5), bY(70), 250, 18, 'stone'),  // stone platform
      // Shelter on top
      B(rX(0.55), bY(88), 12, 50, 'wood'), B(rX(0.7), bY(88), 12, 50, 'wood'),
      B(rX(0.55), bY(138), 160, 12, 'wood'),
    ],
    enemies: [E(rX(0.63), bY(100), 1), E(rX(0.63), bY(14), 4)],
  }));

  // ── Level 7: Maze — stone walls with glass weak points ──
  levels.push(() => ({
    blocks: [
      B(rX(0.5), bY(0), 20, 120, 'stone'),   // left wall
      B(rX(0.78), bY(0), 20, 120, 'stone'),  // right wall
      B(rX(0.5), bY(120), 280, 18, 'stone'), // roof (stone!)
      // Internal divisions with glass weak points
      B(rX(0.6), bY(0), 10, 40, 'glass'),     // inner wall bottom
      B(rX(0.6), bY(55), 10, 65, 'stone'),    // inner wall top (stone)
      B(rX(0.7), bY(40), 10, 80, 'glass'),    // second inner wall
    ],
    enemies: [E(rX(0.55), bY(14), 3), E(rX(0.65), bY(14), 0), E(rX(0.75), bY(14), 2)],
  }));

  // ── Level 8: Tall tower — enemies stacked inside ──
  levels.push(() => ({
    blocks: [
      B(rX(0.6), bY(0), 15, 180, 'wood'),    // left wall
      B(rX(0.73), bY(0), 15, 180, 'wood'),   // right wall
      B(rX(0.6), bY(45), 130, 10, 'wood'),   // floor 1
      B(rX(0.6), bY(90), 130, 10, 'wood'),   // floor 2
      B(rX(0.6), bY(135), 130, 10, 'wood'),  // floor 3
      B(rX(0.6), bY(180), 130, 12, 'stone'), // roof
    ],
    enemies: [E(rX(0.67), bY(14), 4), E(rX(0.67), bY(58), 1), E(rX(0.67), bY(103), 0)],
  }));

  // ── Level 9: Double fortress ──
  levels.push(() => ({
    blocks: [
      // Fort A (stone)
      B(rX(0.45), bY(0), 18, 80, 'stone'), B(rX(0.6), bY(0), 18, 80, 'stone'),
      B(rX(0.45), bY(80), 130, 15, 'stone'),
      B(rX(0.5), bY(40), 90, 10, 'wood'), // inner shelf
      // Fort B (stone + glass)
      B(rX(0.68), bY(0), 18, 80, 'stone'), B(rX(0.83), bY(0), 18, 80, 'stone'),
      B(rX(0.68), bY(80), 130, 15, 'glass'), // glass roof — weak point!
      B(rX(0.73), bY(40), 70, 10, 'wood'),
    ],
    enemies: [E(rX(0.53), bY(12), 0), E(rX(0.53), bY(52), 3), E(rX(0.76), bY(12), 4), E(rX(0.76), bY(52), 1)],
  }));

  // ── Level 10: The Bunker — full stone, glass only at top ──
  levels.push(() => ({
    blocks: [
      // Outer walls (stone — nearly unbreakable)
      B(rX(0.4), bY(0), 22, 160, 'stone'), B(rX(0.82), bY(0), 22, 160, 'stone'),
      B(rX(0.4), bY(160), 310, 20, 'stone'), // stone roof
      // Inner chambers
      B(rX(0.52), bY(0), 12, 70, 'wood'), B(rX(0.7), bY(0), 12, 70, 'wood'),
      B(rX(0.52), bY(70), 190, 12, 'wood'), // mid floor
      B(rX(0.52), bY(115), 190, 12, 'wood'), // upper floor
      // Glass skylight — only way in from above
      B(rX(0.55), bY(155), 80, 10, 'glass'), B(rX(0.68), bY(155), 80, 10, 'glass'),
    ],
    enemies: [
      E(rX(0.6), bY(14), 0), E(rX(0.72), bY(14), 3),
      E(rX(0.6), bY(82), 4), E(rX(0.72), bY(82), 1), E(rX(0.6), bY(127), 2),
    ],
  }));

  return levels;
}

let LEVELS = generateLevels();

// ─── Load level ──────────────────────────
function loadLevel(idx) {
  LEVELS = generateLevels(); // regenerate for current canvas size
  const lvl = LEVELS[idx]();
  blocks = lvl.blocks;
  enemies = lvl.enemies;
  bird = null;
  particles = [];
  debris = [];
  birdsLeft = 5;
  timeLeft = 60;
  levelScore = 0;
  gamePhase = 'AIM';
  settleTimer = 0;
  isDragging = false;
  updateHUD();
  startTimer();
}

// ─── Timer ───────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('hud-timer').textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endLevel(false);
    }
  }, 1000);
}

function updateHUD() {
  document.getElementById('hud-score').textContent = totalScore + levelScore;
  document.getElementById('hud-level').textContent = currentLevel + 1;
  document.getElementById('hud-birds').textContent = birdsLeft;
  document.getElementById('hud-timer').textContent = timeLeft;
}

// ═══════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════

// Angry Birds style sky gradient
function drawBackground() {
  const w = W(), h = H();
  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, '#4AA3DF');
  sky.addColorStop(0.5, '#7BC8F6');
  sky.addColorStop(0.85, '#B5E8B5');
  sky.addColorStop(1, '#5D8C3E');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  [[w*0.2, 60, 1], [w*0.5, 40, 0.8], [w*0.8, 75, 0.6]].forEach(([cx, cy, s]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, 25*s, 0, Math.PI*2);
    ctx.arc(cx+20*s, cy-8*s, 20*s, 0, Math.PI*2);
    ctx.arc(cx+40*s, cy, 22*s, 0, Math.PI*2);
    ctx.arc(cx+18*s, cy+8*s, 18*s, 0, Math.PI*2);
    ctx.fill();
  });

  // Ground
  const groundY = h - 60;
  ctx.fillStyle = '#5D8C3E';
  ctx.fillRect(0, groundY, w, 60);
  ctx.fillStyle = '#4A7A30';
  ctx.fillRect(0, groundY, w, 8);

  // Grass tufts
  ctx.fillStyle = '#6BA34A';
  for (let gx = 0; gx < w; gx += 18) {
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.lineTo(gx+4, groundY-8-Math.random()*6);
    ctx.lineTo(gx+8, groundY);
    ctx.fill();
  }
}

function drawSlingshot() {
  const sx = SLING_X(), sy = SLING_Y();
  // Back band
  ctx.strokeStyle = '#3D1F00';
  ctx.lineWidth = 4;

  // Fork
  ctx.fillStyle = '#6B3410';
  ctx.fillRect(sx-5, sy-50, 10, 60);
  // Left arm
  ctx.save(); ctx.translate(sx-5, sy-50); ctx.rotate(-0.3);
  ctx.fillRect(-4, -30, 8, 35); ctx.restore();
  // Right arm
  ctx.save(); ctx.translate(sx+5, sy-50); ctx.rotate(0.3);
  ctx.fillRect(-4, -30, 8, 35); ctx.restore();

  // Rubber band
  if (isDragging || gamePhase === 'AIM') {
    const bx = isDragging ? dragX : sx;
    const by = isDragging ? dragY : sy - 55;
    ctx.strokeStyle = '#2A1500';
    ctx.lineWidth = 4;
    // Left band
    ctx.beginPath(); ctx.moveTo(sx-12, sy-75); ctx.lineTo(bx, by); ctx.stroke();
    // Right band
    ctx.beginPath(); ctx.moveTo(sx+12, sy-75); ctx.lineTo(bx, by); ctx.stroke();
  }
}

function drawBird(x, y, r, angle = 0) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  if (dishiLoaded) {
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.clip();
    ctx.drawImage(dishiImg, -r, -r, r*2, r*2);
  } else {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = `bold ${r}px Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('D', 0, 2);
  }
  ctx.restore();
  // Outline
  ctx.strokeStyle = '#CC8800';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
}

function drawBlock(b) {
  const bt = BLOCK_TYPES[b.type];
  ctx.save();
  ctx.translate(b.x + b.w/2, b.y + b.h/2);
  ctx.rotate(b.angle || 0);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(-b.w/2+3, -b.h/2+3, b.w, b.h);

  // Body
  ctx.fillStyle = bt.color;
  ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h*0.3);

  // Damage cracks
  if (b.hp < BLOCK_TYPES[b.type].hp) {
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-b.w*0.2, -b.h*0.3);
    ctx.lineTo(b.w*0.1, b.h*0.1);
    ctx.lineTo(-b.w*0.05, b.h*0.4);
    ctx.stroke();
  }

  // Outline
  ctx.strokeStyle = bt.dark;
  ctx.lineWidth = 2;
  ctx.strokeRect(-b.w/2, -b.h/2, b.w, b.h);

  // Glass shine
  if (b.type === 'glass') {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(-b.w/2+3, -b.h/2+2, b.w*0.3, b.h*0.4);
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  ctx.font = `${e.r*2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(e.emoji, e.x, e.y);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
  debris.forEach(d => {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);
    ctx.globalAlpha = d.life;
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
    ctx.restore();
  });
}

// Trajectory preview dots
function drawTrajectory() {
  if (!isDragging) return;
  const sx = SLING_X(), sy = SLING_Y() - 55;
  const power = 0.15;
  let vx = (sx - dragX) * power;
  let vy = (sy - dragY) * power;
  let px = sx, py = sy - 55;

  // Show only first few dots — don't reveal full path (adds skill requirement)
  for (let i = 0; i < 18; i++) {
    px += vx; py += vy;
    vy += GRAVITY;
    vx *= AIR_DRAG; vy *= AIR_DRAG;
    vx += WIND_DRIFT;
    if (py > H() - 60) break;
    if (i % 3 === 0) {
      const fade = 1 - i / 18;
      ctx.fillStyle = `rgba(255,255,255,${0.5 * fade})`;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
    }
  }
}

// Bird count indicators
function drawBirdQueue() {
  const sx = SLING_X() - 60;
  const sy = SLING_Y() + 10;
  for (let i = 0; i < birdsLeft - (bird ? 1 : 0); i++) {
    drawBird(sx - i * 28, sy, 12);
  }
}

// ═══════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════
function updateBird() {
  if (!bird || gamePhase !== 'FLYING') return;

  // Aerodynamics: gravity + air drag + wind
  bird.vy += GRAVITY;
  bird.vx *= AIR_DRAG;
  bird.vy *= AIR_DRAG;
  bird.vx += WIND_DRIFT;        // slight wind pushback
  bird.va *= SPIN_DRAG;         // spin slows down

  bird.x += bird.vx;
  bird.y += bird.vy;

  // Rotation follows velocity direction (aerodynamic tilt)
  bird.angle = Math.atan2(bird.vy, bird.vx);

  const groundY = H() - 60 - BIRD_R;
  if (bird.y > groundY) {
    bird.y = groundY;
    bird.vy *= -BOUNCE_DAMPING;
    bird.vx *= GROUND_FRICTION;
    if (Math.abs(bird.vy) < 1) bird.vy = 0;
    if (Math.abs(bird.vx) < 0.3) bird.vx = 0;
  }
  // Walls
  if (bird.x < BIRD_R) { bird.x = BIRD_R; bird.vx *= -0.3; }
  if (bird.x > W() - BIRD_R) { bird.x = W() - BIRD_R; bird.vx *= -0.3; }

  // Check if bird stopped or flew off screen
  const stopped = Math.abs(bird.vx) < 0.2 && Math.abs(bird.vy) < 0.2 && bird.y >= groundY - 1;
  const offScreen = bird.x > W() + 50 || bird.y > H() + 50;
  if (stopped || offScreen) {
    gamePhase = 'SETTLING';
    settleTimer = 35;
  }
}

function checkCollisions() {
  if (!bird || gamePhase !== 'FLYING') return;

  // Bird vs blocks
  blocks.forEach(b => {
    if (rectCircleCollision(b, bird)) {
      const speed = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
      // Minimum impact speed required to do damage
      const damage = speed > 3 ? Math.ceil((speed - 2) / 4) : 0;
      b.hp -= Math.max(damage, speed > 2 ? 1 : 0);
      // Push block proportional to impact
      const pushFactor = Math.min(speed / 10, 0.5);
      b.vx = bird.vx * pushFactor;
      b.vy = bird.vy * pushFactor * 0.7;
      b.va = (Math.random() - 0.5) * 0.08;
      // Bird loses most energy on impact
      bird.vx *= -0.2;
      bird.vy *= -0.2;

      if (b.hp <= 0) {
        levelScore += 50;
        spawnDebris(b);
      }
    }
  });

  // Bird vs enemies — need real speed to damage
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx = bird.x - e.x, dy = bird.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < BIRD_R + e.r) {
      const speed = Math.sqrt(bird.vx*bird.vx + bird.vy*bird.vy);
      if (speed > 2.5) {
        const dmg = Math.ceil((speed - 2) / 3);
        e.hp -= dmg;
        // Push enemy
        e.vx = bird.vx * 0.3;
        e.vy = bird.vy * 0.3;
        if (e.hp <= 0) {
          e.alive = false;
          levelScore += e.points;
          spawnParticles(e.x, e.y, '#FFD700');
        }
      }
      // Bird loses energy regardless
      bird.vx *= 0.3;
      bird.vy *= 0.3;
      updateHUD();
    }
  });

  // Blocks falling on enemies — only if block is moving fast enough
  enemies.forEach(e => {
    if (!e.alive) return;
    blocks.forEach(b => {
      if (b.hp <= 0) return;
      const blockSpeed = Math.sqrt((b.vx||0)**2 + (b.vy||0)**2);
      if (blockSpeed < 1.5) return; // block must be moving
      if (e.x > b.x && e.x < b.x+b.w && e.y > b.y && e.y < b.y+b.h) {
        e.hp -= 1;
        if (e.hp <= 0) {
          e.alive = false;
          levelScore += e.points;
          spawnParticles(e.x, e.y, '#FF6600');
        }
        updateHUD();
      }
    });
  });

  // Remove dead blocks
  blocks = blocks.filter(b => b.hp > 0);
}

function rectCircleCollision(rect, circle) {
  const cx = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
  const cy = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));
  const dx = circle.x - cx, dy = circle.y - cy;
  return (dx*dx + dy*dy) < (BIRD_R * BIRD_R);
}

function updateBlocks() {
  blocks.forEach(b => {
    if (Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) {
      b.vy += GRAVITY * 0.5;
      b.x += b.vx;
      b.y += b.vy;
      b.angle += b.va || 0;
      b.vx *= BLOCK_FRICTION;
      b.vy *= BLOCK_FRICTION;

      const groundY = H() - 60 - b.h;
      if (b.y > groundY) {
        b.y = groundY;
        b.vy *= -0.2;
        b.vx *= 0.5;
        if (Math.abs(b.vy) < 0.5) b.vy = 0;
      }
    }
  });

  // Enemies gravity
  enemies.forEach(e => {
    if (!e.alive) return;
    e.vy = (e.vy || 0) + GRAVITY * 0.3;
    e.y += e.vy;
    const groundY = H() - 60 - e.r;
    if (e.y > groundY) { e.y = groundY; e.vy = 0; }
  });
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.025; p.size *= 0.97;
  });
  particles = particles.filter(p => p.life > 0);

  debris.forEach(d => {
    d.x += d.vx; d.y += d.vy; d.vy += 0.2;
    d.angle += d.va; d.life -= 0.02;
  });
  debris = debris.filter(d => d.life > 0);
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 15; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 4;
    particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2,
      life: 1, color, size: 3 + Math.random() * 4
    });
  }
}

function spawnDebris(b) {
  const bt = BLOCK_TYPES[b.type];
  for (let i = 0; i < 6; i++) {
    debris.push({
      x: b.x + Math.random()*b.w, y: b.y + Math.random()*b.h,
      w: 5+Math.random()*10, h: 4+Math.random()*8,
      vx: (Math.random()-0.5)*5, vy: -2-Math.random()*4,
      angle: Math.random()*Math.PI, va: (Math.random()-0.5)*0.2,
      color: bt.color, life: 1,
    });
  }
  spawnParticles(b.x+b.w/2, b.y+b.h/2, bt.color);
}

// ═══════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════
function launchBird() {
  if (birdsLeft <= 0 || gamePhase !== 'AIM') return;
  const sx = SLING_X(), sy = SLING_Y() - 55;
  const power = 0.15;  // reduced — need precise aim

  bird = {
    x: dragX, y: dragY,
    vx: (sx - dragX) * power,
    vy: (sy - dragY) * power,
    angle: 0, va: 0,
  };
  birdsLeft--;
  gamePhase = 'FLYING';
  updateHUD();

  // Play sound — sync duration with flight
  launchSound.currentTime = 0;
  launchSound.playbackRate = 1.0;
  launchSound.play().catch(() => {});
}

function nextBirdOrEnd() {
  bird = null;
  // Check if all enemies dead
  if (enemies.every(e => !e.alive)) {
    endLevel(true);
    return;
  }
  if (birdsLeft <= 0) {
    endLevel(false);
    return;
  }
  gamePhase = 'AIM';
}

function endLevel(cleared) {
  clearInterval(timerInterval);
  gamePhase = 'LEVEL_DONE';

  // Bonus for remaining birds and time (modest)
  const birdBonus = birdsLeft * 80;
  const timeBonus = Math.round(timeLeft * 3);
  const clearBonus = cleared ? 200 : 0;
  levelScore += birdBonus + timeBonus + clearBonus;
  totalScore += levelScore;

  // Stars based on: enemies killed + birds remaining
  const enemiesKilled = enemies.filter(e => !e.alive).length;
  const totalEnemies = enemies.length;
  const allKilled = enemiesKilled === totalEnemies;
  // 3 stars: all killed with 2+ birds remaining
  // 2 stars: all killed
  // 1 star: at least half killed
  // 0 stars: less than half
  const stars = (allKilled && birdsLeft >= 2) ? 3
              : allKilled ? 2
              : (enemiesKilled >= totalEnemies / 2) ? 1
              : 0;

  const ov = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = cleared ? '🎉 שלב הושלם!' : '💔 נגמרו הדישים!';
  document.getElementById('ov-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('ov-score').innerHTML =
    `💥 ${levelScore} נק'` +
    (birdBonus ? `<br>🐦 בונוס דישים: +${birdBonus}` : '') +
    (timeBonus ? `<br>⏱ בונוס זמן: +${timeBonus}` : '');

  const nextBtn = document.getElementById('btn-next');
  const isLast = currentLevel >= 9;
  if (isLast || !cleared) {
    nextBtn.style.display = 'none';
  } else {
    nextBtn.style.display = '';
    nextBtn.textContent = '▶ שלב הבא';
  }

  ov.classList.add('show');

  // Save score at game end or final level
  if (isLast || !cleared) {
    if (_olympicMode) {
      window.parent.postMessage({ type: 'OLYMPIDISHI_SCORE', score: totalScore }, '*');
    } else {
      trySaveScore(totalScore);
    }
  }
}

document.getElementById('btn-next').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  currentLevel++;
  loadLevel(currentLevel);
});

document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  totalScore -= levelScore;
  loadLevel(currentLevel);
});

// ═══════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches?.[0] ?? e.changedTouches?.[0];
  const cx = t ? t.clientX : e.clientX;
  const cy = t ? t.clientY : e.clientY;
  return { x: cx - rect.left, y: cy - rect.top };
}

function onDown(e) {
  e.preventDefault();
  if (gamePhase !== 'AIM') return;
  const pos = getPos(e);
  const sx = SLING_X(), sy = SLING_Y() - 55;
  const dx = pos.x - sx, dy = pos.y - sy;
  if (Math.sqrt(dx*dx+dy*dy) < SLING_RADIUS + 30) {
    isDragging = true;
    dragX = pos.x; dragY = pos.y;
    aimX = pos.x; aimY = pos.y;
  }
}

function onMove(e) {
  e.preventDefault();
  if (!isDragging) return;
  const pos = getPos(e);
  const sx = SLING_X(), sy = SLING_Y() - 55;
  const dx = pos.x - sx, dy = pos.y - sy;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const maxPull = SLING_RADIUS;
  if (dist > maxPull) {
    dragX = sx + (dx/dist)*maxPull;
    dragY = sy + (dy/dist)*maxPull;
  } else {
    dragX = pos.x; dragY = pos.y;
  }
}

function onUp(e) {
  e.preventDefault();
  if (!isDragging) return;
  isDragging = false;
  const sx = SLING_X(), sy = SLING_Y() - 55;
  const dx = sx - dragX, dy = sy - dragY;
  if (Math.sqrt(dx*dx+dy*dy) > 10) {
    launchBird();
  }
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp, {passive:false});

// ═══════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════
function gameLoop() {
  const w = W(), h = H();
  drawBackground();
  drawSlingshot();
  drawTrajectory();
  drawBirdQueue();

  blocks.forEach(drawBlock);
  enemies.forEach(drawEnemy);

  if (bird) {
    drawBird(bird.x, bird.y, BIRD_R, bird.angle);
  } else if (gamePhase === 'AIM' && isDragging) {
    drawBird(dragX, dragY, BIRD_R);
  } else if (gamePhase === 'AIM') {
    drawBird(SLING_X(), SLING_Y() - 55, BIRD_R);
  }

  drawParticles();

  updateBird();
  checkCollisions();
  updateBlocks();
  updateParticles();

  // Settling phase
  if (gamePhase === 'SETTLING') {
    settleTimer--;
    if (settleTimer <= 0) nextBirdOrEnd();
  }

  updateHUD();
  requestAnimationFrame(gameLoop);
}

// ─── Start logic ─────────────────────────
const _spaceOverlay = document.getElementById('space-overlay');
let _started = false;

function startGame() {
  if (_started) return;
  _started = true;
  _spaceOverlay.classList.add('hidden');
  currentLevel = 0;
  totalScore = 0;
  loadLevel(0);
  requestAnimationFrame(gameLoop);
}

if (_olympicMode) {
  startGame();
} else {
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !_started) { e.preventDefault(); startGame(); }
  });
  _spaceOverlay.addEventListener('click', startGame);
}
</script>
