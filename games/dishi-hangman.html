<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>דיש תלוי</title>
  <link rel="icon" type="image/png" href="../assets/dishi.png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(150deg, #0d0820 0%, #1a0d2e 45%, #2a1240 100%);
      color: #f0e0d0;
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px 12px 24px;
      user-select: none;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      background: linear-gradient(135deg, #ff6b35, #ff9a5c, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2px;
      text-align: center;
    }

    #score-area {
      color: #ffb88c;
      font-size: 0.9rem;
      margin-bottom: 6px;
      font-weight: 700;
    }

    /* ── Timer ────────────────────────────────── */
    #timer-area {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      color: #ffb88c;
      font-family: 'Fredoka One', cursive;
      font-size: 1rem;
    }
    #timer-label { font-size: 1.4rem; }
    #timerDisplay {
      font-size: 3.4rem;
      line-height: 1;
      display: inline-block;
      min-width: 74px;
      text-align: center;
      color: #ffd700;
      transition: color 0.25s;
    }
    @keyframes tick-bounce {
      0%   { transform: scale(1); }
      28%  { transform: scale(1.25); }
      60%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    .tick { animation: tick-bounce 0.3s ease; }

    /* Urgent: last 10 seconds */
    .timer-urgent #timerDisplay {
      color: #ff3333;
      animation: urgent-pulse 0.42s ease infinite alternate;
    }
    @keyframes urgent-pulse {
      from { transform: scale(1);    filter: none; }
      to   { transform: scale(1.14); filter: drop-shadow(0 0 10px rgba(255,51,51,0.9)); }
    }
    #urgent-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 50;
      display: none;
      animation: overlay-pulse 0.42s ease infinite alternate;
    }
    #urgent-overlay.show { display: block; }
    @keyframes overlay-pulse {
      from { background: transparent; }
      to   { background: rgba(255,0,0,0.05); }
    }

    /* Bonus flash */
    #bonus-flash {
      position: fixed; top: 108px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Fredoka One', cursive; font-size: 1.5rem;
      color: #00ff99; text-shadow: 0 0 14px rgba(0,255,153,0.75);
      opacity: 0; transition: opacity 0.15s;
      pointer-events: none; z-index: 200;
    }
    #bonus-flash.show { opacity: 1; }

    /* Gallows SVG */
    #hangman-svg {
      display: block;
      margin: 0 auto 8px;
      width: 160px;
      height: 185px;
      filter: drop-shadow(0 0 10px rgba(255,107,53,0.3));
    }
    .g-base {
      stroke: #ff8c42; stroke-width: 3.5; stroke-linecap: round; fill: none;
    }
    .g-part { opacity: 0; transition: opacity 0.3s ease; }
    .g-part.on { opacity: 1; }
    .g-line { stroke: #ff6b35; stroke-width: 3; stroke-linecap: round; fill: none; }

    /* Lives */
    #lives {
      font-size: 1rem;
      margin-bottom: 4px;
      letter-spacing: 3px;
      text-align: center;
      min-height: 24px;
    }

    /* Word display — RTL: row = right→left */
    #word-display {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 5px;
      margin-bottom: 6px;
      min-height: 50px;
      max-width: 360px;
    }
    .letter-box {
      width: 30px; height: 42px;
      border-bottom: 3px solid rgba(255,140,66,0.55);
      text-align: center; font-size: 1.45rem;
      font-weight: 900; color: #fff5e0; line-height: 42px;
    }
    .letter-box.space { width: 16px; border-bottom: none; }
    .letter-box.pop { animation: pop 0.35s ease forwards; }
    @keyframes pop {
      0%   { transform: scale(1.5) translateY(-4px); color: #ff9a5c; }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); color: #fff5e0; }
    }

    /* Hint */
    #hint-text {
      color: #ffb88c; font-size: 0.85rem; margin-bottom: 10px;
      min-height: 20px; text-align: center; opacity: 0.85;
    }

    /* Keyboard */
    #keyboard {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 5px; max-width: 360px; margin-bottom: 10px; direction: rtl;
    }
    .key-btn {
      background: rgba(255,107,53,0.1);
      border: 1.5px solid rgba(255,140,66,0.3);
      color: #ffd0a0;
      width: 36px; height: 36px; border-radius: 8px;
      font-size: 1rem; font-family: 'Nunito', sans-serif;
      font-weight: 700; cursor: pointer;
      transition: background 0.13s, transform 0.1s, border-color 0.13s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .key-btn:hover:not(:disabled) {
      background: rgba(255,107,53,0.32);
      border-color: rgba(255,140,66,0.65);
      transform: scale(1.12);
    }
    .key-btn:active:not(:disabled) { transform: scale(0.9); }
    .key-btn:disabled { opacity: 0.18; cursor: default; transform: none !important; }
    .key-btn.wrong  { background: rgba(200,50,30,0.28); border-color: rgba(220,80,60,0.45); color: rgba(255,140,120,0.55); }
    .key-btn.correct{ background: rgba(60,200,80,0.18); border-color: rgba(80,220,100,0.45); color: rgba(140,255,150,0.85); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-7px); }
      40% { transform: translateX(7px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .shake { animation: shake 0.38s ease; }

    /* Result overlay */
    #result {
      display: none; position: fixed; inset: 0;
      background: rgba(5,2,18,0.94);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; z-index: 100; padding: 28px 20px;
      overflow-y: auto;
    }
    #result.show { display: flex; }

    #result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.6rem; text-align: center; line-height: 1.1;
    }
    #result-reveal {
      width: 100px; height: 100px; border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255,180,80,0.6);
      box-shadow: 0 0 28px rgba(255,140,53,0.35);
    }
    #result-reveal img { width: 100%; height: 100%; object-fit: cover; }
    #result-word { color: #ffb88c; font-size: 1rem; text-align: center; }

    /* Session-end stats */
    #result-stats {
      display: none; width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 18px;
    }
    #result-stats.show { display: block; }
    .stat-line {
      font-size: 0.88rem; color: #f0e0d0;
      line-height: 2; display: flex; gap: 6px;
    }
    .stat-line b { color: #ffd700; margin-right: auto; }
    .stat-words {
      font-size: 0.78rem; color: rgba(240,224,208,0.7);
      line-height: 1.7; margin-top: 2px;
      word-break: break-word;
    }
    .stat-final {
      font-family: 'Fredoka One', cursive; font-size: 1.6rem;
      color: #ffd700; text-align: center; margin-top: 6px;
      text-shadow: 0 0 16px rgba(255,215,0,0.45);
    }

    #result-score {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8rem; color: #ffd700;
      text-shadow: 0 0 16px rgba(255,215,0,0.4);
      text-align: center;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b35, #ff9a5c);
      color: white; border: none; padding: 13px 36px;
      border-radius: 50px; cursor: pointer;
      font-family: 'Fredoka One', cursive; font-size: 1.2rem;
      box-shadow: 0 4px 20px rgba(255,107,53,0.45);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(255,107,53,0.65); }
    #save-status {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; font-size: 0.78rem; min-height: 28px;
      color: rgba(240,224,208,0.55);
    }
    #save-status.saved  { color: rgba(100,220,130,0.9); }
    #save-status.nosave { color: rgba(240,200,130,0.7); }
    #save-status img {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid rgba(100,220,130,0.5);
      object-fit: cover;
    }

    /* Space-to-start overlay */
    #space-overlay {
      position: fixed; inset: 0; z-index: 90;
      background: rgba(13,8,32,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; pointer-events: all; cursor: pointer;
    }
    #space-overlay.hidden { display: none; }
    #space-overlay .spc-title {
      font-family: 'Fredoka One', cursive; font-size: 2rem; color: #fff;
      text-shadow: 0 0 24px rgba(255,107,53,0.8);
    }
    #space-overlay .spc-hint {
      font-family: 'Fredoka One', cursive; font-size: 1.25rem;
      color: #ffd700; animation: spc-blink 1.1s ease-in-out infinite;
    }
    @keyframes spc-blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.35; }
    }
    /* ── Mobile responsiveness ── */
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      #timerDisplay { font-size: clamp(2rem, 8vw, 3.4rem); }
      #hangman-svg { width: min(140px, 40vw); height: auto; }
      #word-display { max-width: 100%; padding: 0 4px; }
      .letter-box { width: 26px; height: 36px; font-size: 1.2rem; line-height: 36px; }
      #keyboard { max-width: 100%; gap: 4px; padding: 0 2px; }
      .key-btn { width: 32px; height: 44px; font-size: 0.9rem; border-radius: 6px; }
      #hint-text { font-size: 0.78rem; }
      .btn { padding: 13px 28px; font-size: 1rem; }
      #bonus-flash { top: 80px; font-size: 1.2rem; }
      #result-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

<audio id="bgMusic" src="../assets/דישי השומר של כל העם.mp3" loop></audio>
<div id="urgent-overlay"></div>
<div id="bonus-flash"></div>
<div id="space-overlay">
  <div class="spc-title">🎭 דיש תלוי</div>
  <div class="spc-hint">לחץ SPACE להתחלת המשחק</div>
</div>

<h1>🎭 דיש תלוי</h1>
<div id="score-area">ניקוד: <span id="scoreDisplay">0</span></div>
<div id="timer-area">
  <span id="timer-label">⏱</span>
  <span id="timerDisplay">60</span>
</div>

<!-- Gallows SVG: Dishi's photo IS the head -->

<div id="lives"></div>
<div id="word-display"></div>
<div id="hint-text"></div>
<div id="keyboard"></div>

<div id="result">
  <div id="result-title"></div>
  <div id="result-reveal"><img src="../assets/dishi.png" alt="דישי"></div>
  <div id="result-word"></div>
  <div id="result-score"></div>
  <div id="result-stats"></div>
  <div id="save-status"></div>
  <button class="btn" id="result-btn" style="display:none">🎮 משחק חדש</button>
</div>

<script type="module">
const _params      = new URLSearchParams(location.search);
const _olympicMode = _params.get('olympic') === '1';
// seed: integer offset into WORDS array so each player gets different words
const _wordSeed    = parseInt(_params.get('seed') || '0', 10);

async function trySaveScore(score) {
  const el = document.getElementById('save-status');
  if (el) { el.className = ''; el.textContent = '⏳ שומר ניקוד...'; }
  try {
    const [{ saveScore }, { auth }] = await Promise.all([
      import('../leaderboard.js'),
      import('../firebase-config.js'),
    ]);
    if (!auth.currentUser) {
      if (el) { el.className = 'nosave'; el.textContent = '🔒 התחבר בלובי כדי לשמור ניקוד'; }
      return;
    }
    await saveScore('dishi-hangman', auth.currentUser, score);
    if (el) {
      const u = auth.currentUser;
      const _e = s => { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; };
      el.className = 'saved';
      el.innerHTML = `${u.photoURL ? `<img src="${_e(u.photoURL)}" alt="">` : ''}✅ שלום ${_e(u.displayName)}! ניקוד נשמר`;
    }
  } catch (e) { if (el) el.textContent = ''; console.warn('Score not saved:', e); }
}

const isHebrew = ch => /[\u05D0-\u05EA]/.test(ch);

const WORDS = [
  { word: 'נייר טואלט',      hint: 'מוצר הכי חשוב בצבא' },
  { word: 'מכולה',           hint: 'מה שדישי הוא לפעמים' },
  { word: 'דישי',            hint: 'הגיבור שלנו 👑' },
  { word: 'גור',             hint: 'כינוי חיבה' },
  { word: 'משה',             hint: 'שם קלאסי' },
  { word: 'מסופחים',         hint: 'חיילים שהושאלו לחיל אחר' },
  { word: 'תורנים',          hint: 'מי שתורו לעשות כל מיני דברים' },
  { word: 'טפ\u05f4ש מטבח',  hint: 'תפקיד לא מכובד במיוחד' },
  { word: 'רוני',            hint: 'שם שמופיע בסיפורים' },
  { word: 'תדר',             hint: '"אתה יורד לי מה..."' },
  { word: 'בלאי',            hint: 'ציוד שנשחק' },
  { word: 'רספיה',           hint: 'המאכל שדישי הוא מלכו' },
  { word: 'גזרות',           hint: 'דברים שאין ברירה לעשות' },
  { word: 'דנה',             hint: 'שם נשי' },
  { word: 'מגבים',           hint: 'כלי ניקיון נפוץ' },
  { word: 'קקי סטיק',        hint: 'כלי ספציפי מאוד לניקיון...' },
  { word: 'תקלות בינוי',     hint: 'בעיות שקורות בשיפוצים' },
  { word: 'מנותק',           hint: 'רוני אומר שדישי...' },
  { word: 'אנטריקוט',       hint: 'רוני הכי אוהב...' },
  { word: 'לכבות שריפות',   hint: 'התפקיד של דישי בגדוד...' },
  { word: 'ריענון מדים',    hint: 'המשימה האהובה על כל הרס״פים' },
  { word: 'דוגית',           hint: 'מוצב בגזרה' },
  { word: 'חטיבה צפונית',   hint: 'האויב של הגדוד' },
];

const PARTS      = ['part-hat','part-bucket','part-watergun','part-head','part-body','part-arm-l','part-arm-r','part-leg-l','part-leg-r'];
const MAX_WRONG  = 9;
const ALEPH_BET  = 'אבגדהוזחטיכלמנסעפצקרשת';
const FINALS     = 'םךןץף';
const FINAL_TO_BASE = { 'ם':'מ', 'ך':'כ', 'ן':'נ', 'ץ':'צ', 'ף':'פ' };
const ROUND_TIME = 60;   // initial session seconds
const BONUS_TIME = 5;    // seconds added per correct word

function normalizeLetter(ch) { return FINAL_TO_BASE[ch] || ch; }
function normalizeWord(w)    { return w.split('').map(normalizeLetter).join(''); }

// ── State ────────────────────────────────────────────────────────
let state = { word:'', hint:'', guessed:new Set(), wrongCount:0, score:0, roundScore:0 };
let usedWords     = new Set();
let timerInterval = null;
let timeLeft      = ROUND_TIME;
let sessionActive = false;

// Session statistics
let session = {
  correctCount:  0,
  correctWords:  [],   // [{ word, timeSec }]
  roundStart:    0,    // Date.now() at word start
  sessionStart:  0,    // Date.now() at session start
};

// ── Timer ─────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay(false);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay(true); // tick animation
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timeLeft = 0;
      if (sessionActive) {
        sessionActive = false;
        // If mid-word overlay is showing, close it first
        document.getElementById('result').classList.remove('show');
        setTimeout(showSessionEnd, 150);
      }
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

let _bonusFlashTimer = null;
function showBonusFlash(text) {
  const el = document.getElementById('bonus-flash');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(_bonusFlashTimer);
  _bonusFlashTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

function updateTimerDisplay(tick = false) {
  const el   = document.getElementById('timerDisplay');
  const area = document.getElementById('timer-area');
  const urg  = document.getElementById('urgent-overlay');
  el.textContent = Math.max(0, timeLeft);
  if (tick) {
    el.classList.remove('tick');
    void el.offsetWidth; // reflow to restart animation
    el.classList.add('tick');
  }
  if (timeLeft <= 10) {
    area.classList.add('timer-urgent');
    urg.classList.add('show');
  } else {
    area.classList.remove('timer-urgent');
    urg.classList.remove('show');
  }
}

// ── Word picking ──────────────────────────────────────────────────
// In olympic mode, shuffle WORDS deterministically by seed so each player
// gets a unique non-overlapping sequence.
const _wordQueue = (() => {
  const arr = [...WORDS];
  // Fisher-Yates with seed-based offset (simple but effective)
  for (let i = arr.length - 1; i > 0; i--) {
    const j = (i * 2654435769 + _wordSeed * 6364136223 + i) % (i + 1);
    [arr[i], arr[Math.abs(j) % arr.length]] = [arr[Math.abs(j) % arr.length], arr[i]];
  }
  return arr;
})();
let _wordQueueIdx = 0;

function pickWord() {
  if (_olympicMode) {
    // cycle through the seeded queue
    if (_wordQueueIdx >= _wordQueue.length) _wordQueueIdx = 0;
    return _wordQueue[_wordQueueIdx++];
  }
  if (usedWords.size >= WORDS.length) usedWords.clear();
  let w;
  do { w = WORDS[Math.floor(Math.random() * WORDS.length)]; } while (usedWords.has(w.word));
  usedWords.add(w.word);
  return w;
}

// ── Session lifecycle ─────────────────────────────────────────────
function startSession() {
  stopTimer();
  const _bgm = document.getElementById('bgMusic');
  if (_bgm) { _bgm.volume = 0.3; _bgm.currentTime = 0; _bgm.play().catch(() => {}); }
  state.score   = 0;
  session.correctCount = 0;
  session.correctWords = [];
  session.sessionStart = Date.now();
  sessionActive        = true;
  usedWords.clear();
  timeLeft = ROUND_TIME;
  document.getElementById('result').classList.remove('show');
  document.getElementById('urgent-overlay').classList.remove('show');
  startTimer();
  startNewRound();
}

function startNewRound() {
  if (!sessionActive) return;
  const { word, hint } = pickWord();
  state.guessed    = new Set();
  state.wrongCount = 0;
  state.roundScore = word.split('').filter(isHebrew).length * 15;
  state.word       = word;
  state.hint       = hint;
  session.roundStart = Date.now();
  document.getElementById('result').classList.remove('show');
  document.getElementById('result-btn').style.display = 'none';
  document.getElementById('result-stats').classList.remove('show');
  renderGallows();
  renderAll();
}

// ── Render ────────────────────────────────────────────────────────
function renderAll() {
  renderWord();
  renderLives();
  renderKeyboard();
  document.getElementById('hint-text').textContent = `💡 רמז: ${state.hint}`;
  document.getElementById('scoreDisplay').textContent = state.score;
}

function renderWord() {
  const display    = document.getElementById('word-display');
  const prevBoxes  = display.querySelectorAll('.letter-box');
  const oldRevealed = new Set(
    [...prevBoxes].map((el, i) => (el.textContent.trim() ? i : null)).filter(x => x !== null)
  );
  display.innerHTML = state.word.split('').map((ch, i) => {
    const isHebrewChar = isHebrew(ch);
    const revealed = !isHebrewChar || state.guessed.has(normalizeLetter(ch));
    const isNew    = revealed && isHebrewChar && !oldRevealed.has(i);
    const spaceClass = (!isHebrewChar && ch !== '\u05f4') ? ' space' : '';
    return `<div class="letter-box${spaceClass}${isNew ? ' pop' : ''}">${revealed ? ch : ''}</div>`;
  }).join('');
}

function renderLives() {
  const rem = MAX_WRONG - state.wrongCount;
  document.getElementById('lives').textContent = '❤️'.repeat(rem) + '🖤'.repeat(state.wrongCount);
}

function renderKeyboard() {
  const kb       = document.getElementById('keyboard');
  const normWord = normalizeWord(state.word);
  function keyHTML(ch) {
    const norm      = normalizeLetter(ch);
    const isGuessed = state.guessed.has(norm);
    const inWord    = normWord.includes(norm);
    let cls = 'key-btn';
    if (isGuessed && !inWord) cls += ' wrong';
    if (isGuessed && inWord)  cls += ' correct';
    return `<button class="${cls}" ${isGuessed ? 'disabled' : ''} onclick="guess('${ch}')">${ch}</button>`;
  }
  kb.innerHTML =
    ALEPH_BET.split('').map(keyHTML).join('') +
    '<div style="width:100%;height:4px"></div>' +
    FINALS.split('').map(keyHTML).join('');
}

function renderGallows() {
  PARTS.forEach((id, i) => document.getElementById(id).classList.toggle('on', i < state.wrongCount));
}

// ── Per-word result (brief, auto-advance) ─────────────────────────
function showWordResult(won) {
  const wordGuessed = state.word;

  if (won) {
    const timeSec = Math.round((Date.now() - session.roundStart) / 1000);
    const earned  = state.roundScore + Math.round(timeLeft * 1.5);
    state.score  += earned;

    // Bonus time + one life back
    timeLeft = Math.min(timeLeft + BONUS_TIME, 180);
    updateTimerDisplay(false);
    showBonusFlash(`+${BONUS_TIME}s ⏱`);
    if (state.wrongCount > 0) {
      state.wrongCount--;
      renderGallows();
    }

    // Record
    session.correctCount++;
    session.correctWords.push({ word: wordGuessed, timeSec });

    document.getElementById('scoreDisplay').textContent = state.score;
    document.getElementById('result-title').textContent = '🎉 כל הכבוד!';
    document.getElementById('result-word').textContent  = wordGuessed;
    document.getElementById('result-score').textContent = `+${earned} נקודות`;
    document.getElementById('result-stats').classList.remove('show');
    document.getElementById('result-btn').style.display = 'none';
    document.getElementById('result').classList.add('show');

    setTimeout(() => {
      document.getElementById('result').classList.remove('show');
      startNewRound();
    }, 1300);

  } else {
    // Lives exhausted (not timer — timer triggers showSessionEnd directly)
    document.getElementById('result-title').textContent = '💔 אוי לא...';
    document.getElementById('result-word').textContent  = `המילה הייתה: ${wordGuessed}`;
    document.getElementById('result-score').textContent = '';
    document.getElementById('result-stats').classList.remove('show');
    document.getElementById('result-btn').style.display = 'none';
    document.getElementById('result').classList.add('show');

    setTimeout(() => {
      document.getElementById('result').classList.remove('show');
      startNewRound();
    }, 1700);
  }
}

// ── Session end ────────────────────────────────────────────────────
function showSessionEnd(reason = 'time') {
  stopTimer();
  document.getElementById('urgent-overlay').classList.remove('show');
  document.getElementById('timer-area').classList.remove('timer-urgent');

  const totalSec = Math.round((Date.now() - session.sessionStart) / 1000);
  const avgSec   = session.correctCount > 0
    ? Math.round(session.correctWords.reduce((s, w) => s + w.timeSec, 0) / session.correctCount)
    : 0;

  const wordListHTML = session.correctWords.length
    ? session.correctWords.map(w => `${w.word} (${w.timeSec}s)`).join(' &nbsp;•&nbsp; ')
    : '—';

  const statsEl = document.getElementById('result-stats');
  statsEl.innerHTML = `
    <div class="stat-line">✅ תשובות נכונות: <b>${session.correctCount}</b></div>
    <div class="stat-line">⚡ זמן ממוצע לתשובה: <b>${avgSec}s</b></div>
    <div class="stat-line">⏱ זמן כולל: <b>${totalSec}s</b></div>
    <div class="stat-words">📋 ${wordListHTML}</div>
    <div class="stat-final">🏆 ${state.score} נקודות</div>
  `;

  document.getElementById('result-title').textContent = reason === 'dead' ? '💀 דישי תלוי!' : '⏰ נגמר הזמן!';
  document.getElementById('result-word').textContent  = '';
  document.getElementById('result-score').textContent = '';
  statsEl.classList.add('show');
  document.getElementById('result-btn').style.display = 'inline-block';
  document.getElementById('result').classList.add('show');

  if (_olympicMode) {
    window.parent.postMessage({ type: 'OLYMPIDISHI_SCORE', score: state.score }, '*');
  } else {
    trySaveScore(state.score);
  }
}

// ── Guess handler ─────────────────────────────────────────────────
window.guess = (ch) => {
  const norm = normalizeLetter(ch);
  if (state.guessed.has(norm)) return;
  state.guessed.add(norm);

  const normWord = normalizeWord(state.word);
  if (!normWord.includes(norm)) {
    state.wrongCount++;
    state.roundScore = Math.max(0, state.roundScore - 15);
    renderGallows();
    const svg = document.getElementById('hangman-svg');
    svg.classList.remove('shake');
    void svg.offsetWidth;
    svg.classList.add('shake');
  }

  const hebrewChars = new Set(state.word.split('').filter(isHebrew).map(normalizeLetter));
  const allGuessed  = [...hebrewChars].every(c => state.guessed.has(c));
  const dead        = state.wrongCount >= MAX_WRONG;

  renderAll();

  if (allGuessed)   setTimeout(() => showWordResult(true),  350);
  else if (dead)  { sessionActive = false; setTimeout(() => showSessionEnd('dead'), 500); }
};

// ── Boot ──────────────────────────────────────────────────────────
const _spaceOverlay = document.getElementById('space-overlay');

function showSpaceOverlay(onStart) {
  _spaceOverlay.classList.remove('hidden');
  // Request focus so Space keydown reaches this window even inside an iframe
  _spaceOverlay.setAttribute('tabindex', '0');
  _spaceOverlay.focus();

  function _go() {
    _spaceOverlay.classList.add('hidden');
    window.removeEventListener('keydown', _kHandler);
    _spaceOverlay.removeEventListener('keydown', _kHandler);
    _spaceOverlay.removeEventListener('click', _go);
    onStart();
  }
  function _kHandler(e) {
    if (e.code === 'Space') { e.preventDefault(); _go(); }
  }
  window.addEventListener('keydown', _kHandler);
  _spaceOverlay.addEventListener('keydown', _kHandler);
  _spaceOverlay.addEventListener('click', _go, { once: true });
}

function launchSession() {
  if (_olympicMode) {
    _spaceOverlay.classList.add('hidden');
    startSession();
  } else {
    showSpaceOverlay(startSession);
  }
}

document.getElementById('result-btn').addEventListener('click', launchSession);
launchSession();
</script>
