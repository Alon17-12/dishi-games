<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏅 האולימפידישי — שואו</title>
  <link rel="icon" type="image/png" href="assets/dishi.png">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    }

    #fw-canvas {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
    }
    #cf-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }

    /* ── Video wrapper ── */
    #video-wrap {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      opacity: 0;
      transform: scale(0.5) translateY(40px);
      transition: opacity .9s ease, transform .9s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    #video-wrap.show {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    #mazel-tov {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #ffd700, #ff9a00, #ff69b4, #ffd700);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shine 2.5s ease-in-out infinite;
      text-shadow: none;
      letter-spacing: 1px;
    }
    @keyframes shine {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #bday-video {
      max-width: 88vw;
      max-height: 74vh;
      border-radius: 18px;
      box-shadow:
        0 0 0 3px rgba(255,215,0,0.7),
        0 0 60px rgba(255,200,0,0.55),
        0 0 130px rgba(255,130,0,0.3);
      display: block;
    }

    /* ── Tap-to-play fallback ── */
    #tap-hint {
      position: fixed; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.6);
      color: #ffd700;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
    }
    #tap-hint.show { opacity: 1; pointer-events: all; }

    #skip-btn {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
      padding: 10px 24px;
      border-radius: 10px;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    #skip-btn:hover { background: rgba(255,255,255,0.22); color: #fff; }

    /* ── Outro overlay ── */
    #outro {
      position: fixed; inset: 0; z-index: 80;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .9s ease;
    }
    #outro.show { opacity: 1; }

    #outro-medal {
      font-size: clamp(4rem, 12vw, 7rem);
      opacity: 0;
      transform: scale(0.3) rotate(-30deg);
      transition: opacity .7s ease .2s, transform .7s cubic-bezier(0.34, 1.5, 0.64, 1) .2s;
    }
    #outro-medal.show { opacity: 1; transform: scale(1) rotate(0deg); }

    #outro-title {
      font-size: clamp(2.4rem, 8vw, 5rem);
      font-weight: 900;
      color: #f0c040;
      text-shadow:
        0 0 30px rgba(240,192,64,0.9),
        0 0 70px rgba(240,192,64,0.5),
        0 0 120px rgba(240,150,0,0.3);
      text-align: center;
      letter-spacing: -1px;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s ease .55s, transform .7s ease .55s;
    }
    #outro-title.show { opacity: 1; transform: translateY(0); }

    #outro-sub {
      font-size: clamp(.9rem, 2.5vw, 1.3rem);
      color: rgba(240,224,192,0.7);
      opacity: 0;
      transition: opacity .6s ease .9s;
    }
    #outro-sub.show { opacity: 1; }
  </style>
</head>
<body>

<canvas id="fw-canvas"></canvas>
<canvas id="cf-canvas"></canvas>

<div id="video-wrap">
  <div id="mazel-tov">🎉 מזל טוב לדישי שלנו! 🎉</div>
  <video id="bday-video" playsinline>
    <source src="assets/סרטון יום הולדת לדישי.MOV" type="video/quicktime">
    <source src="assets/סרטון יום הולדת לדישי.MOV" type="video/mp4">
  </video>
</div>

<div id="tap-hint">▶ לחץ להפעלה</div>

<button id="skip-btn" onclick="goToOlympic()">דלג על הסרטון ←</button>

<div id="outro">
  <div id="outro-medal">🏅</div>
  <div id="outro-title">האולימפידישי</div>
  <div id="outro-sub">מתחיל עוד רגע…</div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  FIREWORKS
// ════════════════════════════════════════════════════════
const fwCanvas = document.getElementById('fw-canvas');
const fwCtx    = fwCanvas.getContext('2d');

function resizeFW() {
  fwCanvas.width  = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeFW);
resizeFW();

const FW_COLORS = [
  '#ff6b6b','#ffd700','#ff69b4','#00cfff',
  '#7fff00','#ff8c00','#ee82ee','#00ffcc',
  '#ff4444','#fff176','#b388ff',
];

let fwParticles = [];

function burst(x, y, color) {
  const n = 90 + Math.floor(Math.random() * 50);
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + (Math.random() - .5) * .25;
    const spd   = 1.8 + Math.random() * 5.5;
    fwParticles.push({
      x, y,
      vx:    Math.cos(angle) * spd,
      vy:    Math.sin(angle) * spd,
      alpha: 1,
      color,
      size:  1.5 + Math.random() * 2.5,
      grav:  0.07 + Math.random() * 0.04,
    });
  }
  // Sparkle ring
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    fwParticles.push({
      x, y,
      vx:    Math.cos(angle) * (8 + Math.random() * 4),
      vy:    Math.sin(angle) * (8 + Math.random() * 4),
      alpha: .9,
      color: '#fff',
      size:  1 + Math.random(),
      grav:  0.12,
    });
  }
}

let shells = [];
function launchShell() {
  const x       = window.innerWidth  * (.15 + Math.random() * .7);
  const targetY = window.innerHeight * (.05 + Math.random() * .45);
  const color   = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  const frames  = 28 + Math.floor(Math.random() * 18);
  shells.push({ x, y: window.innerHeight + 10, targetY, color, frames, f: 0,
                vx: (x - window.innerWidth / 2) / frames * .3 });
}

let _fwLastTs = 0;
function fwLoop(ts = 0) {
  const _fwDt = _fwLastTs ? Math.min((ts - _fwLastTs) / 1000, 0.05) * 60 : 1;
  _fwLastTs = ts;

  fwCtx.fillStyle = 'rgba(0,0,0,0.17)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

  // Shells
  shells = shells.filter(s => s.f <= s.frames);
  shells.forEach(s => {
    s.f += _fwDt;
    const prog = Math.min(s.f / s.frames, 1);
    s.y = window.innerHeight + 10 - (window.innerHeight + 10 - s.targetY) * prog;
    s.x += s.vx * _fwDt;
    if (s.f >= s.frames) { burst(s.x, s.y, s.color); return; }
    fwCtx.beginPath();
    fwCtx.arc(s.x, s.y, 3, 0, Math.PI * 2);
    fwCtx.fillStyle = s.color;
    fwCtx.globalAlpha = 0.9;
    fwCtx.fill();
    fwCtx.globalAlpha = 1;
    // trail
    fwCtx.beginPath();
    fwCtx.moveTo(s.x, s.y);
    fwCtx.lineTo(s.x - s.vx * 6, s.y + (window.innerHeight - s.targetY) / s.frames * 6);
    fwCtx.strokeStyle = s.color;
    fwCtx.globalAlpha = 0.3;
    fwCtx.lineWidth = 1.5;
    fwCtx.stroke();
    fwCtx.globalAlpha = 1;
  });

  // Particles
  fwParticles = fwParticles.filter(p => p.alpha > 0.03);
  fwParticles.forEach(p => {
    p.x  += p.vx * _fwDt;
    p.y  += p.vy * _fwDt;
    p.vy += p.grav * _fwDt;
    p.vx *= Math.pow(0.96, _fwDt);
    p.vy *= Math.pow(0.96, _fwDt);
    p.alpha -= 0.016 * _fwDt;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fillStyle = p.color;
    fwCtx.globalAlpha = Math.max(0, p.alpha);
    fwCtx.fill();
    fwCtx.globalAlpha = 1;
  });

  fwRaf = requestAnimationFrame(fwLoop);
}

let fwRaf = requestAnimationFrame(fwLoop);
let fwInterval = setInterval(launchShell, 550);

// ════════════════════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════════════════════
const cfCanvas = document.getElementById('cf-canvas');
const cfCtx    = cfCanvas.getContext('2d');

function resizeCF() {
  cfCanvas.width  = window.innerWidth;
  cfCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCF);
resizeCF();

const CF_COLORS = ['#f0c040','#40e080','#e04080','#60a0f0','#e080f0','#fff','#ff6b35','#00ffcc'];
const confetti  = Array.from({ length: 110 }, () => ({
  x:  Math.random() * window.innerWidth,
  y:  Math.random() * -window.innerHeight,
  w:  5 + Math.random() * 9,
  h:  9 + Math.random() * 7,
  r:  Math.random() * Math.PI * 2,
  dr: (Math.random() - .5) * .18,
  vy: 1.4 + Math.random() * 2.8,
  vx: (Math.random() - .5) * 1.8,
  col: CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)],
}));

let _cfLastTs = 0;
function cfLoop(ts = 0) {
  const _cfDt = _cfLastTs ? Math.min((ts - _cfLastTs) / 1000, 0.05) * 60 : 1;
  _cfLastTs = ts;
  cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  confetti.forEach(p => {
    p.y += p.vy * _cfDt; p.x += p.vx * _cfDt; p.r += p.dr * _cfDt;
    if (p.y > cfCanvas.height + 20) { p.y = -20; p.x = Math.random() * cfCanvas.width; }
    cfCtx.save();
    cfCtx.translate(p.x, p.y);
    cfCtx.rotate(p.r);
    cfCtx.fillStyle = p.col;
    cfCtx.globalAlpha = 0.88;
    cfCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cfCtx.restore();
  });
  cfRaf = requestAnimationFrame(cfLoop);
}
let cfRaf = requestAnimationFrame(cfLoop);

// ════════════════════════════════════════════════════════
//  VIDEO + TRANSITIONS
// ════════════════════════════════════════════════════════
const videoWrap = document.getElementById('video-wrap');
const video     = document.getElementById('bday-video');
const tapHint   = document.getElementById('tap-hint');
const outro     = document.getElementById('outro');

// Reveal video with delay
setTimeout(() => videoWrap.classList.add('show'), 300);

// Try autoplay
const playPromise = video.play();
if (playPromise !== undefined) {
  playPromise.catch(() => {
    // Autoplay blocked — show tap hint
    tapHint.classList.add('show');
    tapHint.addEventListener('click', () => {
      video.play();
      tapHint.classList.remove('show');
    }, { once: true });
  });
}

function goToOlympic() {
  clearInterval(fwInterval);
  cancelAnimationFrame(fwRaf);
  cancelAnimationFrame(cfRaf);
  window.location.href = 'olympidishi.html';
}

// Fallback: if video never plays (unsupported MOV, load error), navigate after 8s
const _navFallback = setTimeout(goToOlympic, 8000);

// If video starts playing, extend the timeout to full video length + buffer
video.addEventListener('playing', () => {
  clearTimeout(_navFallback);
}, { once: true });

video.addEventListener('error', () => {
  clearTimeout(_navFallback);
  setTimeout(goToOlympic, 2000);
});

// On video end → luxurious outro → navigate
video.addEventListener('ended', () => {
  clearTimeout(_navFallback);
  clearInterval(fwInterval);

  // Rapid finale burst
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      for (let j = 0; j < 3; j++) launchShell();
    }, i * 120);
  }

  setTimeout(() => {
    outro.classList.add('show');
    setTimeout(() => {
      document.getElementById('outro-medal').classList.add('show');
      document.getElementById('outro-title').classList.add('show');
      document.getElementById('outro-sub').classList.add('show');
    }, 80);
  }, 400);

  setTimeout(() => {
    cancelAnimationFrame(fwRaf);
    cancelAnimationFrame(cfRaf);
    window.location.href = 'olympidishi.html';
  }, 3200);
});
</script>
</body>
</html>
